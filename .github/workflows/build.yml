name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 SDK 平台与构建工具
        run: |
          set -e
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 赋予 gradlew 可执行权限
        run: chmod +x gradlew

      - name: 构建 Debug APK
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log
          code=${PIPESTATUS[0]}
          echo "BUILD_EXIT_CODE=$code" >> $GITHUB_ENV
          exit $code

      - name: 提取错误到 Summary（失败时）
        if: failure()
        run: |
          echo "## ❌ 构建失败，错误摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 关键错误行" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "error:|e: file|FAILURE:|What went wrong|> Task.*FAILED|Execution failed|Caused by:" build-output.log | head -80 >> $GITHUB_STEP_SUMMARY || echo "（未匹配到关键错误行）" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 最后 150 行日志" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -150 build-output.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 上传完整构建日志（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-log
          path: build-output.log
          if-no-files-found: warn
          retention-days: 7

      - name: 上传 APK 产物（成功时）
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: novel-reader-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
