name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # 支持在 Actions 页面手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          # 项目 compileSdk/targetSdk 需要 34
          packages: |
            platforms;android-34
            build-tools;34.0.0

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 赋予 gradlew 可执行权限
        run: chmod +x gradlew

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: novel-reader-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
